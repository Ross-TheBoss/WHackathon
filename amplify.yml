version: 1
applications:
  - appRoot: app/frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm install --cache .npm --prefer-offline
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: build
        files:
          - '**/*'
      cache:
        paths:
          - .npm/**/*
          - node_modules/**/*
