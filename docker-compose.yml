services:
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile.backend
    container_name: whackathon-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:?set in .env}:${MYSQL_PASSWORD:?set in .env}@mysql:3306/${MYSQL_DATABASE:?set in .env}
      SECRET_KEY: ${SECRET_KEY:?set in .env}
      PYTHONUNBUFFERED: "1"
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_API_URL: ""
    container_name: whackathon-frontend
    ports:
      - "80:80"
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - backend
  
  mysql:
    image: mysql:8
    container_name: whackathon-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?set in .env}
      MYSQL_USER: ${MYSQL_USER:?set in .env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set in .env}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 40s
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data: